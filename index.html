<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hospital Spoofer</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
height:100vh;
overflow:hidden;
background:#050505;
color:white;
}

.background{
position:fixed;
inset:0;
background:
radial-gradient(circle at 50% 30%, rgba(138,43,226,.35), transparent 35%),
linear-gradient(to bottom,#090909,#000000);
z-index:-3;
}

.stars{
position:fixed;
inset:0;
background-image:
radial-gradient(#b56cff 1px, transparent 1px);
background-size:40px 40px;
opacity:.35;
animation:moveStars 35s linear infinite;
z-index:-2;
}

.stars2{
position:fixed;
inset:0;
background-image:
radial-gradient(#7e22ce 1px, transparent 1px);
background-size:80px 80px;
opacity:.2;
animation:moveStars 70s linear infinite reverse;
z-index:-2;
}

.glow{
position:absolute;
width:700px;
height:700px;
background:#8a2be2;
border-radius:50%;
filter:blur(220px);
opacity:.2;
left:50%;
top:40%;
transform:translate(-50%,-50%);
animation:pulse 6s ease-in-out infinite;
}

nav{
position:fixed;
top:25px;
left:50%;
transform:translateX(-50%);
padding:14px 24px;
border-radius:999px;
background:rgba(255,255,255,.04);
backdrop-filter:blur(12px);
border:1px solid rgba(168,85,247,.2);
display:flex;
gap:25px;
}

nav a{
text-decoration:none;
color:#cfcfcf;
transition:.3s;
}

nav a:hover{
color:#b56cff;
}

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.badge{
padding:8px 16px;
border-radius:999px;
background:rgba(168,85,247,.1);
border:1px solid rgba(168,85,247,.25);
color:#c084fc;
margin-bottom:20px;
}

h1{
font-size:clamp(4rem,10vw,8rem);
font-weight:800;
letter-spacing:4px;
line-height:.95;
text-shadow:
0 0 20px rgba(181,108,255,.7),
0 0 60px rgba(181,108,255,.4);
animation:floatText 5s ease-in-out infinite;
}

.subtitle{
margin-top:25px;
font-size:1.1rem;
color:#a0a0a0;
max-width:650px;
}

.buttons{
margin-top:40px;
display:flex;
gap:15px;
flex-wrap:wrap;
justify-content:center;
}

.btn{
padding:15px 30px;
border-radius:999px;
text-decoration:none;
font-weight:600;
transition:.3s;
}

.primary{
background:#9333ea;
color:white;
box-shadow:0 0 25px rgba(147,51,234,.5);
}

.primary:hover{
transform:translateY(-3px);
box-shadow:0 0 45px rgba(147,51,234,.9);
}

.secondary{
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.1);
color:white;
}

.secondary:hover{
transform:translateY(-3px);
border-color:#9333ea;
}

@keyframes moveStars{
from{
transform:translateY(0);
}
to{
transform:translateY(-100px);
}
}

@keyframes pulse{
0%,100%{
transform:translate(-50%,-50%) scale(1);
}
50%{
transform:translate(-50%,-50%) scale(1.15);
}
}

@keyframes floatText{
0%,100%{
transform:translateY(0);
}
50%{
transform:translateY(-8px);
}
}
</style>
</head>

<body>

<div class="background"></div>
<div class="stars"></div>
<div class="stars2"></div>
<div class="glow"></div>

<nav>
<a href="#">Home</a>
<a href="#">Features</a>
<a href="#">Status</a>
<a href="#">Contact</a>
</nav>

<div class="hero">

<div class="badge">
● ONLINE
</div>

<h1>
HOSPITAL<br>
SPOOFER
</h1>

<p class="subtitle">
Modern. Clean. Premium.
Built with a futuristic purple aesthetic and smooth animations.
</p>

<div class="buttons">
<a href="#" class="btn primary">Get Started</a>
<a href="#" class="btn secondary">Discord</a>
</div>

</div>

</body>
</html>
